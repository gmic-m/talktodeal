<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="TalkToDeal captures every on-site quote automatically. No typing. No lost revenue. Book a 15-min demo." />
  <title>TalkToDeal — Stop Losing Field Quotes</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: #0C0C0E;
      color: rgba(255,255,255,0.9);
      font-family: system-ui, -apple-system, 'Inter', 'SF Pro Display', sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* ── Fade-in ──────────────────────────────────────────────────────────── */
    .fade-in {
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.9s cubic-bezier(0.16,1,0.3,1),
                  transform 0.9s cubic-bezier(0.16,1,0.3,1);
    }
    .fade-in.visible { opacity: 1; transform: translateY(0); }

    /* ── Keyframes ───────────────────────────────────────────────────────── */
    @keyframes aurora-drift {
      0%   { transform: translateX(0)    translateY(0)    scale(1);    opacity: 0.7; }
      33%  { transform: translateX(30px) translateY(-20px) scale(1.05); opacity: 1.0; }
      66%  { transform: translateX(-20px) translateY(15px) scale(0.97); opacity: 0.8; }
      100% { transform: translateX(15px) translateY(-30px) scale(1.03); opacity: 0.9; }
    }
    @keyframes pulse-glow {
      0%, 100% { opacity: 0.6; transform: translateX(-50%) scale(1); }
      50%       { opacity: 1.0; transform: translateX(-50%) scale(1.08); }
    }
    @keyframes float-up {
      0%   { transform: translateY(0px);   opacity: 0.15; }
      50%  { transform: translateY(-20px); opacity: 0.35; }
      100% { transform: translateY(-40px); opacity: 0;    }
    }
    @keyframes float-device {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-14px); }
    }

    /* ── Nav ──────────────────────────────────────────────────────────────── */
    .nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center;
      padding: 28px 48px;
      background: transparent;
      transition: background 0.3s ease, backdrop-filter 0.3s ease, -webkit-backdrop-filter 0.3s ease, border-bottom 0.3s ease;
    }
    .nav-wordmark {
      font-size: 15px; font-weight: 500; letter-spacing: -0.01em;
      color: #FFFFFF; text-decoration: none; flex-shrink: 0;
    }
    .nav-links {
      display: flex; align-items: center; gap: 32px;
      flex: 1; justify-content: center;
    }
    .nav-link {
      font-size: 13px; font-weight: 400;
      color: rgba(255,255,255,0.5); text-decoration: none;
      transition: color 0.2s ease;
    }
    .nav-link:hover { color: rgba(255,255,255,0.9); }
    .nav-cta {
      font-size: 13px; font-weight: 500; color: #FFFFFF;
      text-decoration: none; background: rgba(255,255,255,0.08);
      border-radius: 980px; padding: 8px 18px;
      transition: background 0.2s ease; flex-shrink: 0;
    }
    .nav-cta:hover { background: rgba(255,255,255,0.14); }
    .nav-hamburger {
      display: none; background: none; border: none; cursor: pointer;
      padding: 4px; color: #FFFFFF; margin-left: auto;
    }

    /* ── Hero ─────────────────────────────────────────────────────────────── */
    .hero {
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      position: relative; text-align: center;
      padding: 140px 48px 160px;
      overflow: hidden;
    }

    /* Aurora background layer */
    .hero-bg {
      position: absolute; inset: 0; overflow: hidden;
      pointer-events: none; z-index: 0;
    }
    .ao {
      position: absolute; border-radius: 50%;
    }
    .ao1 {
      width: 900px; height: 600px;
      top: -200px; left: 50%; margin-left: -450px;
      background: radial-gradient(ellipse, rgba(66,133,244,0.13) 0%, rgba(66,133,244,0.04) 40%, transparent 70%);
      animation: aurora-drift 8s ease-in-out infinite alternate;
    }
    .ao2 {
      width: 600px; height: 500px;
      bottom: -100px; left: -100px;
      background: radial-gradient(ellipse, rgba(100,160,255,0.08) 0%, transparent 65%);
      animation: aurora-drift 11s ease-in-out infinite alternate-reverse;
    }
    .ao3 {
      width: 500px; height: 400px;
      top: 0; right: -80px;
      background: radial-gradient(ellipse, rgba(66,133,244,0.06) 0%, transparent 60%);
      animation: aurora-drift 13s ease-in-out infinite alternate;
    }
    /* Floating particles */
    .hp {
      position: absolute; width: 2px; height: 2px; border-radius: 50%;
      background: rgba(66,133,244,0.5);
      animation: float-up linear infinite;
    }

    /* Hero content wrapper — sits above aurora */
    .hero-content {
      position: relative; z-index: 1;
      display: flex; flex-direction: column; align-items: center;
      width: 100%;
    }

    .hero-eyebrow {
      font-size: 11px; font-weight: 500; letter-spacing: 0.12em;
      text-transform: uppercase; color: rgba(255,255,255,0.38);
      margin-bottom: 40px;
    }
    .hero-h1 {
      font-size: clamp(64px, 9vw, 120px);
      font-weight: 300; line-height: 0.95; letter-spacing: -0.04em;
    }
    .hero-h1-line1 { display: block; color: rgba(255,255,255,0.9); }
    .hero-h1-line2 { display: block; color: #FFFFFF; }
    .hero-h1-line3 { display: block; color: rgba(255,255,255,0.58); font-weight: 200; }
    .hero-accent { color: #E8E0D4; }
    .hero-gone {
      font-size: 28px; font-weight: 300;
      color: rgba(255,255,255,0.6); margin-top: 48px;
    }
    .hero-cta-wrap { margin-top: 56px; }
    .hero-cta-btn {
      display: inline-flex; align-items: center;
      font-size: 15px; font-weight: 400; color: #FFFFFF;
      text-decoration: none; background: rgba(255,255,255,0.08);
      border-radius: 980px; padding: 14px 32px; border: none;
      cursor: pointer; font-family: inherit;
      transition: background 0.2s ease;
    }
    .hero-cta-btn:hover { background: rgba(255,255,255,0.14); }
    .hero-note {
      font-size: 13px; color: rgba(255,255,255,0.38); margin-top: 20px;
    }
    /* Stat strip */
    .hero-stat-strip {
      position: absolute; bottom: 52px; left: 0; right: 0; width: 100%;
      display: flex; flex-direction: row; justify-content: center; align-items: center;
      gap: 0; z-index: 2;
    }
    .hero-stat-sep { width: 1px; height: 28px; background: rgba(255,255,255,0.12); flex-shrink: 0; }
    .hero-stat {
      display: flex; flex-direction: column; align-items: center; text-align: center;
      padding: 0 36px;
    }
    .hero-stat-num { font-size: 15px; font-weight: 500; color: #FFFFFF; letter-spacing: -0.01em; }
    .hero-stat-lbl { font-size: 11px; color: rgba(255,255,255,0.35); margin-top: 4px; letter-spacing: 0.02em; }

    /* ── Full-bleed Photos ────────────────────────────────────────────────── */
    .photo-section { position: relative; overflow: hidden; }
    .photo-section img {
      width: 100%; height: 110%; object-fit: cover;
      display: block; will-change: transform; margin-top: -5%;
    }
    .photo-grad-top {
      position: absolute; top: 0; left: 0; right: 0; height: 25%;
      background: linear-gradient(to bottom, #0C0C0E 0%, transparent 100%);
      pointer-events: none; z-index: 1;
    }
    .photo-grad-bottom {
      position: absolute; bottom: 0; left: 0; right: 0; height: 35%;
      background: linear-gradient(to top, #0C0C0E 0%, transparent 100%);
      pointer-events: none; z-index: 1;
    }
    .ps1 { height: 80vh; }
    .ps2 { height: 65vh; }

    /* Photo 1 overlays */
    .p1-left {
      position: absolute; bottom: 60px; left: 60px; z-index: 2; max-width: 440px;
    }
    .p1-left-label { font-size: 12px; color: rgba(255,255,255,0.58); margin-bottom: 10px; }
    .p1-left-quote { font-size: 22px; font-weight: 300; color: #FFFFFF; line-height: 1.4; }
    .p1-right {
      position: absolute; bottom: 60px; right: 60px; z-index: 2;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-radius: 12px; padding: 16px 22px;
    }
    .p1-right-label {
      font-size: 10px; color: rgba(255,255,255,0.4);
      text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 10px;
    }
    .p1-right-items { font-size: 13px; color: rgba(255,255,255,0.8); line-height: 1.9; }

    /* Photo 2 center overlay */
    .p2-center {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
      z-index: 2; text-align: center; max-width: 600px; width: 90%;
      pointer-events: none;
    }
    .p2-text { font-size: 32px; font-weight: 300; color: #FFFFFF; line-height: 1.4; }

    /* ── Product Section ─────────────────────────────────────────────────── */
    .product-section {
      padding: 140px 48px; position: relative;
      background: radial-gradient(ellipse 700px 500px at 30% 50%, rgba(66,133,244,0.07) 0%, transparent 55%), #0C0C0E;
    }
    .product-inner {
      max-width: 1100px; margin: 0 auto;
      display: grid; grid-template-columns: 55% 45%; gap: 80px; align-items: center;
    }
    .product-img-col { position: relative; }
    .product-img-wrap {
      position: relative; display: flex; align-items: center; justify-content: center;
      min-height: 400px; background: transparent;
    }
    .product-device-glow {
      position: absolute; width: 400px; height: 260px; border-radius: 50%;
      background: radial-gradient(ellipse, rgba(66,133,244,0.15) 0%, transparent 65%);
      top: 50%; left: 50%; transform: translate(-50%, -50%);
      z-index: 0; pointer-events: none;
    }
    .product-text-col { }
    .product-eyebrow {
      font-size: 11px; font-weight: 500; letter-spacing: 0.12em;
      text-transform: uppercase; color: rgba(255,255,255,0.35); margin-bottom: 24px;
    }
    .product-headline {
      font-size: clamp(36px, 4.5vw, 54px); font-weight: 300; color: #FFFFFF;
      letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 20px;
    }
    .product-sub {
      font-size: 16px; color: rgba(255,255,255,0.52); line-height: 1.75;
      max-width: 380px; margin-bottom: 40px;
    }
    .product-feature {
      display: flex; gap: 16px; align-items: flex-start;
      padding: 16px 0; border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .product-feature:last-child { border-bottom: none; }
    .pf-check {
      width: 22px; height: 22px; border-radius: 50%; flex-shrink: 0;
      background: rgba(66,133,244,0.15);
      display: flex; align-items: center; justify-content: center;
      margin-top: 2px;
    }
    .pf-checkmark { font-size: 11px; color: #4285F4; line-height: 1; }
    .pf-title { font-size: 15px; font-weight: 500; color: #FFFFFF; }
    .pf-desc { font-size: 13px; color: rgba(255,255,255,0.42); margin-top: 3px; line-height: 1.5; }

    /* ── Before / After ──────────────────────────────────────────────────── */
    .ba-section { padding: 180px 48px; }
    .ba-inner {
      max-width: 1000px; margin: 0 auto;
      display: grid; grid-template-columns: 1fr 1px 1fr; gap: 64px;
      align-items: start;
    }
    .ba-sep { background: rgba(255,255,255,0.06); align-self: stretch; }
    .ba-col-label {
      font-size: 10px; color: rgba(255,255,255,0.38);
      letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 32px;
    }
    .ba-item { font-size: 17px; font-weight: 300; line-height: 2.6; }

    /* ── Scenarios ────────────────────────────────────────────────────────── */
    .scenarios-section { padding: 180px 48px; }
    .scenarios-inner { max-width: 800px; margin: 0 auto; }
    .section-eyebrow {
      font-size: 11px; font-weight: 500; letter-spacing: 0.12em;
      text-transform: uppercase; color: rgba(255,255,255,0.38); margin-bottom: 24px;
    }
    .section-title {
      font-size: clamp(28px, 4vw, 44px); font-weight: 300;
      color: #FFFFFF; letter-spacing: -0.025em; line-height: 1.1;
      margin-bottom: 80px;
    }
    .section-title-accent { color: #E8E0D4; }
    .scenario-row {
      display: grid; grid-template-columns: 1fr 1fr; gap: 48px;
      padding: 60px 0; border-top: 1px solid rgba(255,255,255,0.06);
    }
    .scenario-row:last-child { border-bottom: 1px solid rgba(255,255,255,0.06); }
    .sc-left-label {
      font-size: 10px; color: rgba(255,255,255,0.32);
      text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 16px;
    }
    .sc-quote {
      font-size: 17px; font-style: italic; font-weight: 300;
      color: rgba(255,255,255,0.58); line-height: 1.65;
    }
    .sc-right-label {
      font-size: 10px; color: rgba(255,255,255,0.38);
      text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 16px;
    }
    .sc-output { font-size: 15px; color: rgba(255,255,255,0.65); line-height: 2.1; }
    .sc-arrow { color: rgba(255,255,255,0.38); margin-right: 6px; }

    /* ── Stats strip ─────────────────────────────────────────────────────── */
    .stats-section {
      padding: 180px 0; position: relative; overflow: hidden;
    }
    .stats-inner {
      max-width: 860px; margin: 0 auto; padding: 80px 48px;
      display: flex; flex-direction: row; align-items: center; justify-content: center;
      position: relative; z-index: 1;
    }
    .stats-glow {
      position: absolute; width: 800px; height: 300px;
      bottom: -100px; left: 50%; transform: translateX(-50%);
      background: radial-gradient(ellipse, rgba(66,133,244,0.10) 0%, transparent 65%);
      pointer-events: none; z-index: 0;
      animation: pulse-glow 5s ease-in-out infinite;
    }
    .stat-item {
      flex: 1;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center;
    }
    .stats-sep { width: 1px; height: 48px; background: rgba(255,255,255,0.1); flex-shrink: 0; margin: 0 32px; }
    .stat-num {
      font-size: clamp(56px, 8vw, 96px); font-weight: 300;
      color: #FFFFFF; letter-spacing: -0.03em; line-height: 1.0;
    }
    .stat-lbl { font-size: 13px; color: rgba(255,255,255,0.4); margin-top: 10px; font-weight: 400; text-align: center; }

    /* ── Social Proof ────────────────────────────────────────────────────── */
    .proof-section { padding: 160px 48px; }
    .proof-inner { max-width: 680px; margin: 0 auto; text-align: center; }
    .proof-eyebrow {
      font-size: 11px; color: rgba(255,255,255,0.38);
      text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 40px;
    }
    .proof-main { font-size: 28px; font-weight: 300; color: #FFFFFF; line-height: 1.5; }
    .proof-sub {
      font-size: 17px; font-weight: 300; color: rgba(255,255,255,0.72);
      margin-top: 20px; line-height: 1.65;
    }
    .proof-attr { font-size: 12px; color: rgba(255,255,255,0.38); margin-top: 32px; }

    /* ── Final CTA ───────────────────────────────────────────────────────── */
    .cta-section { padding: 200px 48px; position: relative; overflow: hidden; }
    .cta-bg-glow {
      position: absolute; inset: 0; z-index: 0; pointer-events: none;
      background: radial-gradient(ellipse 900px 600px at 0% 100%, rgba(66,133,244,0.14) 0%, transparent 55%);
    }
    .cta-inner { max-width: 700px; position: relative; z-index: 1; }
    .cta-h2 {
      font-size: clamp(56px, 8vw, 104px); font-weight: 300;
      color: #FFFFFF; letter-spacing: -0.04em; line-height: 0.95;
    }
    .cta-sub {
      font-size: 17px; color: rgba(255,255,255,0.58); font-weight: 300; margin-top: 40px;
    }
    .cta-btn-row {
      display: flex; gap: 16px; align-items: center; flex-wrap: wrap; margin-top: 48px;
    }
    .cta-btn-primary {
      display: inline-flex; align-items: center;
      font-size: 15px; font-weight: 500; color: #0C0C0E; text-decoration: none;
      background: rgba(255,255,255,0.9); border-radius: 980px; padding: 15px 36px;
      border: none; cursor: pointer; font-family: inherit;
      transition: background 0.2s ease;
    }
    .cta-btn-primary:hover { background: #FFFFFF; }
    .cta-btn-secondary {
      display: inline-flex; align-items: center;
      font-size: 15px; font-weight: 400; color: rgba(255,255,255,0.5); text-decoration: none;
      background: transparent; padding: 15px 36px; border: none;
      cursor: pointer; font-family: inherit; transition: color 0.2s ease;
    }
    .cta-btn-secondary:hover { color: #FFFFFF; text-decoration: underline; text-underline-offset: 4px; }
    .cta-phone-label { font-size: 12px; color: rgba(255,255,255,0.38); margin-top: 32px; margin-bottom: 6px; }
    .cta-phone { font-size: 17px; font-weight: 400; color: #FFFFFF; text-decoration: none; display: block; }

    /* ── Footer ──────────────────────────────────────────────────────────── */
    .site-footer {
      background: #0C0C0E; padding: 60px 48px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .footer-left { font-size: 13px; color: rgba(255,255,255,0.38); }
    .footer-right { display: flex; gap: 24px; }
    .footer-link {
      font-size: 13px; color: rgba(255,255,255,0.38); text-decoration: none;
      transition: color 0.2s ease;
    }
    .footer-link:hover { color: rgba(255,255,255,0.6); }

    /* ── Video Section (PhotoTwo) ───────────────────────────────────────── */
    .video-split-section {
      position: relative;
      width: 100%;
      min-height: 70vh;
      display: flex;
      flex-direction: row;
      align-items: stretch;
      overflow: hidden;
      background: #0C0C0E;
    }
    .video-split-left {
      width: 50%;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }
    .video-split-left video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      background: #0C0C0E;
    }
    .video-split-fade {
      position: absolute;
      top: 0; right: 0;
      width: 140px; height: 100%;
      background: linear-gradient(to right, transparent, #0C0C0E);
      pointer-events: none;
      z-index: 1;
    }
    .video-split-right {
      width: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 64px 60px 48px;
    }
    .video-split-right p {
      font-size: clamp(24px, 2.8vw, 38px);
      font-weight: 300;
      color: #FFFFFF;
      line-height: 1.4;
      letter-spacing: -0.02em;
      text-align: left;
      max-width: 480px;
      margin: 0;
    }

    /* ── Mobile ──────────────────────────────────────────────────────────── */
    @media (max-width: 768px) {
      .nav { padding: 20px 24px; }
      .nav-links { display: none; }
      .nav-hamburger { display: flex; align-items: center; }
      .hero { padding: 120px 24px 140px; }
      .hero-stat-strip { gap: 20px; bottom: 40px; }
      /* Reduce aurora orb sizes ~50% */
      .ao1 { width: 450px; height: 300px; margin-left: -225px; top: -100px; }
      .ao2 { width: 300px; height: 250px; }
      .ao3 { width: 250px; height: 200px; }
      /* Hide 3 of 6 particles */
      .hp:nth-child(n+6) { display: none; }
      .ps1, .ps2 { height: 50vh; }
      .p1-left { bottom: 40px; left: 24px; right: 120px; }
      .p1-left-quote { font-size: 16px; }
      .p1-right { bottom: 40px; right: 24px; }
      .p2-text { font-size: 22px; }
      /* Product section stacks */
      .product-section { padding: 100px 24px; }
      .product-inner { grid-template-columns: 1fr; gap: 48px; }
      .product-device-glow { width: 240px; height: 140px; }
      .product-img { max-width: 280px; }
      .product-img-fallback { max-width: 100%; height: 280px; }
      .product-img-wrap { min-height: 280px; }
      /* Stats glow reduce */
      .stats-glow { width: 400px; height: 150px; }
      .ba-section  { padding: 100px 24px; }
      .ba-inner { grid-template-columns: 1fr; gap: 48px; }
      .ba-sep { display: none; }
      .scenarios-section { padding: 100px 24px; }
      .scenario-row { grid-template-columns: 1fr; gap: 32px; }
      .stats-section { padding: 80px 0; }
      .stats-inner { flex-direction: column; gap: 0; padding: 40px 24px; }
      .stat-item { padding: 28px 0; width: 100%; }
      .stats-sep { width: 80px; height: 1px; margin: 0; flex-shrink: 0; }
      .p2-device-float { display: none; }
      .video-split-section {
        flex-direction: column;
        min-height: auto;
      }
      .video-split-left {
        width: 100%;
        height: 56vw;
        min-height: 240px;
        flex-shrink: 0;
      }
      .video-split-fade {
        top: auto; right: 0; bottom: 0; left: 0;
        width: 100%; height: 80px;
        background: linear-gradient(to bottom, transparent, #0C0C0E);
      }
      .video-split-right {
        width: 100%;
        padding: 40px 28px 60px;
        justify-content: center;
      }
      .video-split-right p {
        text-align: center;
        font-size: clamp(20px, 5vw, 28px);
      }
      .proof-section { padding: 100px 24px; }
      .proof-main { font-size: 22px; }
      .cta-section { padding: 120px 24px; text-align: center; }
      .cta-inner { max-width: none; }
      .cta-btn-row { justify-content: center; }
      .cta-phone-label, .cta-phone { text-align: center; }
      .site-footer { flex-direction: column; gap: 20px; padding: 40px 24px; text-align: center; }
      .footer-right { justify-content: center; }
    }
  </style>
</head>
<body>

// ─── App ──────────────────────────────────────────────────────────────────────
function App() {
  useEffect(() => {
    // Intersection Observer — fade-in
    const io = new IntersectionObserver(
      (entries) => entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); }),
      { threshold: 0.05 }
    );
    document.querySelectorAll('.fade-in').forEach(el => io.observe(el));

    // Nav frosted glass on scroll
    const nav = document.getElementById('main-nav');
    const handleNavScroll = () => {
      const scrolled = window.scrollY;
      const opacity = Math.min(scrolled / 80, 1);
      if (scrolled > 10) {
        nav.style.background = `rgba(8, 8, 14, ${0.72 * opacity})`;
        nav.style.backdropFilter = `blur(${20 * opacity}px) saturate(180%)`;
        nav.style.webkitBackdropFilter = `blur(${20 * opacity}px) saturate(180%)`;
        nav.style.borderBottom = `1px solid rgba(255,255,255,${0.06 * opacity})`;
      } else {
        nav.style.background = 'transparent';
        nav.style.backdropFilter = 'none';
        nav.style.webkitBackdropFilter = 'none';
        nav.style.borderBottom = 'none';
      }
    };
    window.addEventListener('scroll', handleNavScroll, { passive: true });
    handleNavScroll();

    // Parallax on scroll
    const handleScroll = () => {
      document.querySelectorAll('.parallax-photo').forEach(container => {
        const rect = container.getBoundingClientRect();
        const centerOffset = (rect.top + rect.height / 2) - window.innerHeight / 2;
        const img = container.querySelector('img');
        if (img) img.style.transform = `translateY(${centerOffset * 0.08}px)`;
      });
    };
    window.addEventListener('scroll', handleScroll, { passive: true });
    handleScroll();

    return () => {
      io.disconnect();
      window.removeEventListener('scroll', handleScroll);
      window.removeEventListener('scroll', handleNavScroll);
    };
  }, []);

  return (
    <>
      <Nav/>
      <Hero/>
      <ProductSection/>
      <PhotoOne/>
      <BeforeAfter/>
      <PhotoTwo/>
      <Scenarios/>
      <StatStrip/>
      <DeviceShowcase/>
      <SocialProof/>
      <FinalCTA/>
      <Footer/>
    </>
  );
}
